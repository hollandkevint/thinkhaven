  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e Baskerville';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"66100d06-974a-468e-abad-f652d80aabdb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Libre Baskerville';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"12c38090-a5ae-41fd-ab1a-ac8796e9104b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Libre Baskerville';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"66100d06-974a-468e-abad-f652d80aabdb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root{\n    --cream:#FAF7F2; --parchment:#F5F0E6; --terracotta:#C4785C;\n    --terracotta-hover:#B56A4E; --forest:#4A6741; --ink:#2C2416;\n    --ink-light:#4A3D2E; --dusty-rose:#C9A9A6; --mustard:#D4A84B;\n    --slate-blue:#6B7B8C; --rust:#8B4D3B; --sage:#A3B18A;\n    --display:'Jost','Futura PT','Century Gothic',sans-serif;\n    --body:'Libre Baskerville','Georgia',serif;\n    --mono:'JetBrains Mono','IBM Plex Mono',monospace;\n    --b:rgba(44,36,22,.1);\n    --b2:rgba(44,36,22,.2);\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{scroll-behavior:smooth}\n  body{\n    background:var(--cream);color:var(--ink);\n    font-family:var(--body);font-size:16px;line-height:1.65;\n    -webkit-font-smoothing:antialiased;\n  }\n  h1,h2,h3,h4,h5,h6{font-family:var(--display);font-weight:500;line-height:1.2;color:var(--ink)}\n  .mono{font-family:var(--mono);font-size:.82em}\n  .disp{font-family:var(--display)}\n  a{color:var(--terracotta);text-decoration:none}\n  a:hover{color:var(--terracotta-hover)}\n\n  /* ==== Page shell ==== */\n  .wrap{max-width:1200px;margin:0 auto;padding:0 32px}\n  header.top{\n    border-bottom:1px solid var(--b);background:var(--cream);\n    position:sticky;top:0;z-index:20;backdrop-filter:blur(8px);\n    background:rgba(250,247,242,.92);\n  }\n  .top-inner{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;max-width:1200px;margin:0 auto}\n  .brand{font-family:var(--display);font-weight:600;font-size:18px;letter-spacing:.01em}\n  .brand .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--terracotta);margin-right:10px;transform:translateY(-1px)}\n  nav.toc{display:flex;gap:24px;font-family:var(--display);font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--slate-blue)}\n  nav.toc a{color:var(--slate-blue)}\n  nav.toc a:hover{color:var(--ink)}\n\n  /* ==== Hero ==== */\n  .hero{padding:72px 0 40px;border-bottom:1px solid var(--b)}\n  .eyebrow{font-family:var(--display);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--terracotta);margin-bottom:20px}\n  .hero h1{font-size:56px;line-height:1.05;letter-spacing:-.01em;font-weight:500;max-width:900px;margin-bottom:20px}\n  .hero h1 em{font-family:var(--body);font-style:italic;font-weight:400;color:var(--ink-light)}\n  .hero p.lead{font-size:19px;color:var(--ink-light);max-width:720px;line-height:1.6}\n  .meta{display:flex;gap:36px;margin-top:36px;padding-top:28px;border-top:1px solid var(--b);font-family:var(--display);font-size:13px;color:var(--slate-blue);flex-wrap:wrap}\n  .meta div span{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate-blue);margin-bottom:4px;opacity:.8}\n  .meta div b{color:var(--ink);font-weight:500;font-size:14px}\n\n  /* ==== Summary strip ==== */\n  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b);margin-top:64px;border:1px solid var(--b);border-radius:12px;overflow:hidden}\n  .sc{background:var(--cream);padding:24px 22px}\n  .sc .n{font-family:var(--display);font-size:44px;font-weight:500;line-height:1;letter-spacing:-.02em}\n  .sc .l{font-family:var(--display);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate-blue);margin-top:10px}\n  .sc.red .n{color:var(--rust)}\n  .sc.amber .n{color:var(--mustard)}\n  .sc.green .n{color:var(--forest)}\n  .sc.neutral .n{color:var(--ink)}\n\n  /* ==== Section ==== */\n  section{padding:72px 0}\n  section + section{border-top:1px solid var(--b)}\n  .sec-head{display:flex;align-items:baseline;gap:20px;margin-bottom:40px}\n  .sec-num{font-family:var(--mono);font-size:12px;color:var(--slate-blue);letter-spacing:.1em}\n  .sec-head h2{font-size:32px;letter-spacing:-.005em;font-weight:500}\n  .sec-head .sub{font-family:var(--body);font-style:italic;color:var(--ink-light);margin-left:auto;font-size:15px;max-width:420px;text-align:right;line-height:1.5}\n\n  /* Verdict pills */\n  .verdict{display:inline-flex;align-items:center;gap:8px;padding:4px 12px;border-radius:999px;font-family:var(--display);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;border:1px solid}\n  .verdict.crit{color:var(--rust);border-color:rgba(139,77,59,.3);background:rgba(139,77,59,.06)}\n  .verdict.warn{color:#8a6d20;border-color:rgba(212,168,75,.4);background:rgba(212,168,75,.1)}\n  .verdict.ok{color:var(--forest);border-color:rgba(74,103,65,.3);background:rgba(74,103,65,.06)}\n  .verdict .bd{width:6px;height:6px;border-radius:50%;background:currentColor}\n\n  /* Findings */\n  .findings{display:flex;flex-direction:column;gap:20px}\n  .finding{\n    background:#fff;border:1px solid var(--b);border-radius:14px;\n    padding:28px 30px;position:relative;overflow:hidden;\n  }\n  .finding::before{\n    content:\"\";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ink)\n  }\n  .finding.crit::before{background:var(--rust)}\n  .finding.warn::before{background:var(--mustard)}\n  .finding.ok::before{background:var(--forest)}\n  .f-head{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}\n  .f-id{font-family:var(--mono);font-size:11px;color:var(--slate-blue);letter-spacing:.1em}\n  .f-title{font-family:var(--display);font-size:20px;font-weight:500;flex:1;min-width:300px}\n  .f-body{color:var(--ink-light);line-height:1.7;max-width:820px}\n  .f-body code{font-family:var(--mono);font-size:.85em;background:var(--parchment);padding:2px 6px;border-radius:4px;color:var(--ink)}\n  .f-evidence{\n    margin-top:18px;padding:16px 18px;background:var(--parchment);\n    border-radius:8px;font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--ink-light);\n    white-space:pre-wrap;\n  }\n  .f-evidence b{color:var(--rust);font-weight:500}\n  .f-fix{margin-top:16px;font-size:14px;color:var(--ink-light);line-height:1.65}\n  .f-fix b{font-family:var(--display);font-weight:500;color:var(--ink);display:block;margin-bottom:4px;font-size:12px;letter-spacing:.08em;text-transform:uppercase}\n\n  /* ==== Color drift visual ==== */\n  .drift{\n    display:grid;grid-template-columns:1fr 48px 1fr;gap:0;\n    margin-top:28px;align-items:stretch;\n  }\n  .drift-col{padding:24px;background:#fff;border:1px solid var(--b);border-radius:12px}\n  .drift-col.bad{border-color:rgba(139,77,59,.3)}\n  .drift-col h4{font-size:13px;font-family:var(--display);letter-spacing:.08em;text-transform:uppercase;color:var(--slate-blue);margin-bottom:16px;font-weight:500}\n  .drift-col.bad h4{color:var(--rust)}\n  .swatches{display:flex;flex-wrap:wrap;gap:10px}\n  .sw{width:56px;height:56px;border-radius:8px;border:1px solid var(--b);position:relative}\n  .sw .tag{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9px;color:var(--slate-blue)}\n  .drift-arrow{display:flex;align-items:center;justify-content:center;font-family:var(--mono);color:var(--slate-blue);font-size:20px}\n\n  /* Color system */\n  .palette{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:32px}\n  .color{position:relative}\n  .color .chip{aspect-ratio:1.1;border-radius:10px;border:1px solid var(--b);margin-bottom:12px}\n  .color .n{font-family:var(--display);font-weight:500;font-size:14px}\n  .color .h{font-family:var(--mono);font-size:11px;color:var(--slate-blue);margin-top:3px}\n  .color .u{font-size:12px;color:var(--ink-light);margin-top:6px;line-height:1.4;font-style:italic}\n\n  /* Type specimen */\n  .type-spec{background:#fff;border:1px solid var(--b);border-radius:14px;padding:36px 40px}\n  .type-row{padding:20px 0;border-bottom:1px dashed var(--b);display:grid;grid-template-columns:140px 1fr 120px;gap:24px;align-items:baseline}\n  .type-row:last-child{border-bottom:none}\n  .type-label{font-family:var(--mono);font-size:11px;color:var(--slate-blue);letter-spacing:.08em;text-transform:uppercase}\n  .type-meta{font-family:var(--mono);font-size:11px;color:var(--slate-blue);text-align:right}\n  .t-display{font-family:var(--display);font-size:48px;font-weight:500;line-height:1.1;letter-spacing:-.02em}\n  .t-h1{font-family:var(--display);font-size:36px;font-weight:500;line-height:1.2}\n  .t-h2{font-family:var(--display);font-size:28px;font-weight:500;line-height:1.25}\n  .t-h3{font-family:var(--display);font-size:22px;font-weight:500;line-height:1.3}\n  .t-body{font-family:var(--body);font-size:16px;line-height:1.65}\n  .t-caption{font-family:var(--display);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate-blue)}\n\n  /* Components grid */\n  .cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}\n  .ccard{background:#fff;border:1px solid var(--b);border-radius:14px;padding:28px 30px}\n  .ccard h4{font-family:var(--display);font-size:15px;font-weight:500;margin-bottom:4px}\n  .ccard .dsc{font-family:var(--body);font-size:13px;font-style:italic;color:var(--slate-blue);margin-bottom:20px}\n  .demo{padding:24px;background:var(--cream);border-radius:10px;border:1px dashed var(--b);display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;min-height:100px}\n\n  /* Buttons (as documented) */\n  .btn{font-family:var(--display);font-weight:500;letter-spacing:.02em;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-size:14px;transition:all .2s ease-out}\n  .btn-primary{background:var(--terracotta);color:var(--cream)}\n  .btn-primary:hover{background:var(--terracotta-hover)}\n  .btn-secondary{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}\n  .btn-secondary:hover{background:var(--ink);color:var(--cream)}\n  .btn-ghost{background:transparent;color:var(--terracotta);padding:10px 14px}\n  .btn-ghost:hover{color:var(--terracotta-hover);background:var(--parchment)}\n  .btn-danger{background:var(--rust);color:var(--cream)}\n\n  /* Mode badges */\n  .mbadge{font-family:var(--display);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;border:1px solid}\n  .mbadge .d{width:5px;height:5px;border-radius:50%}\n  .m-inq{color:#8a6d20;border-color:rgba(212,168,75,.4);background:rgba(212,168,75,.12)}\n  .m-inq .d{background:var(--mustard)}\n  .m-dev{color:var(--rust);border-color:rgba(139,77,59,.3);background:rgba(139,77,59,.08)}\n  .m-dev .d{background:var(--rust)}\n  .m-enc{color:#8a5f5c;border-color:rgba(201,169,166,.5);background:rgba(201,169,166,.15)}\n  .m-enc .d{background:var(--dusty-rose)}\n  .m-real{color:var(--slate-blue);border-color:rgba(107,123,140,.3);background:rgba(107,123,140,.08)}\n  .m-real .d{background:var(--slate-blue)}\n\n  /* Chat bubbles */\n  .chat{display:flex;flex-direction:column;gap:10px;width:100%;max-width:420px}\n  .bubble{padding:12px 16px;font-family:var(--body);font-size:14px;line-height:1.55;max-width:85%}\n  .bub-user{background:var(--terracotta);color:var(--cream);border-radius:12px 12px 4px 12px;align-self:flex-end}\n  .bub-ai{background:var(--parchment);color:var(--ink);border:1px solid var(--b);border-radius:12px 12px 12px 4px;align-self:flex-start}\n\n  /* Score */\n  .score-demo{display:flex;gap:24px;align-items:center}\n  .score{font-family:var(--display);font-weight:600;font-size:32px;letter-spacing:-.02em}\n  .score.hi{color:var(--forest)}\n  .score.md{color:var(--mustard)}\n  .score.lo{color:var(--rust)}\n  .score span.sm{font-size:16px;color:var(--slate-blue);font-weight:400;margin-left:2px}\n\n  /* Recommendations */\n  .rec{display:grid;grid-template-columns:48px 1fr;gap:20px;padding:22px 24px;background:#fff;border:1px solid var(--b);border-radius:12px;margin-bottom:14px}\n  .rec-num{font-family:var(--display);font-weight:500;font-size:22px;color:var(--terracotta);line-height:1}\n  .rec h4{font-family:var(--display);font-size:16px;font-weight:500;margin-bottom:6px}\n  .rec p{font-size:14px;color:var(--ink-light);line-height:1.65;max-width:780px}\n  .rec .tagr{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;background:var(--parchment);color:var(--slate-blue);margin-right:6px;margin-top:8px}\n\n  /* Gaps table */\n  .gaps{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--b);border-radius:12px;overflow:hidden}\n  .gaps th{text-align:left;padding:14px 20px;font-family:var(--display);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate-blue);font-weight:500;background:var(--parchment);border-bottom:1px solid var(--b)}\n  .gaps td{padding:16px 20px;border-bottom:1px solid var(--b);font-size:14px;color:var(--ink-light);vertical-align:top}\n  .gaps tr:last-child td{border-bottom:none}\n  .gaps td:first-child{font-family:var(--display);font-weight:500;color:var(--ink);width:220px}\n  .gaps .stat{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;display:inline-block}\n  .gaps .stat.miss{background:rgba(139,77,59,.1);color:var(--rust)}\n  .gaps .stat.weak{background:rgba(212,168,75,.15);color:#8a6d20}\n  .gaps .stat.ok{background:rgba(74,103,65,.1);color:var(--forest)}\n\n  /* Motion suggestions */\n  .motion{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}\n  .mcard{background:#fff;border:1px solid var(--b);border-radius:12px;padding:20px;text-align:center}\n  .mcard .mv{font-family:var(--mono);font-size:12px;color:var(--slate-blue);margin-bottom:8px}\n  .mcard h5{font-family:var(--display);font-size:14px;font-weight:500;margin-bottom:8px}\n  .mcard p{font-size:13px;color:var(--ink-light);font-style:italic}\n\n  footer{padding:48px 0;border-top:1px solid var(--b);color:var(--slate-blue);font-family:var(--display);font-size:12px;letter-spacing:.06em;text-transform:uppercase;text-align:center}\n\n  /* Inline kbd-ish */\n  kbd, .kbd{font-family:var(--mono);font-size:12px;background:var(--parchment);border:1px solid var(--b);border-bottom-width:2px;padding:1px 6px;border-radius:4px;color:var(--ink)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"top\">\n  <div class=\"top-inner\">\n    <div class=\"brand\"><span class=\"dot\"><\u002Fspan>ThinkHaven · Design System Audit<\u002Fdiv>\n    <nav class=\"toc\">\n      <a href=\"#summary\">Summary<\u002Fa>\n      <a href=\"#findings\">Findings<\u002Fa>\n      <a href=\"#tokens\">Tokens<\u002Fa>\n      <a href=\"#components\">Components<\u002Fa>\n      <a href=\"#gaps\">Gaps<\u002Fa>\n      <a href=\"#recs\">Next Steps<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"wrap\">\n\n  <!-- HERO -->\n  <section class=\"hero\">\n    <div class=\"eyebrow\">Review · April 2026<\u002Fdiv>\n    <h1>The Wes Anderson system is strong on paper.<br><em>The shipped product doesn't know about it yet.<\u002Fem><\u002Fh1>\n    <p class=\"lead\">The documented design system (<span class=\"mono\">docs/design/design-system.md<\u002Fspan>, <span class=\"mono\">docs/design-conventions.md<\u002Fspan>) is genuinely distinctive — warm, calm, legible, with real opinions about typography and color. The problem is execution: <b>the implementation layer (<span class=\"mono\">app/globals.css<\u002Fspan>, Tailwind config, landing page, BMAD components) still ships a generic blue/slate starter theme<\u002Fb>. This audit maps the drift, flags gaps in the documented system itself, and recommends concrete next steps.<\u002Fp>\n\n    <div class=\"meta\">\n      <div><span>Aesthetic<\u002Fspan><b>Wes Anderson · vintage study<\u002Fb><\u002Fdiv>\n      <div><span>Stack<\u002Fspan><b>Next.js · Tailwind v4 · Supabase<\u002Fb><\u002Fdiv>\n      <div><span>Docs reviewed<\u002Fspan><b>design-system.md · design-conventions.md<\u002Fb><\u002Fdiv>\n      <div><span>Code reviewed<\u002Fspan><b>app/ · globals.css · components/bmad/*<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SUMMARY STRIP -->\n    <div class=\"summary\" id=\"summary\">\n      <div class=\"sc red\"><div class=\"n\">11<\u002Fdiv><div class=\"l\">High-priority drifts<\u002Fdiv><\u002Fdiv>\n      <div class=\"sc amber\"><div class=\"n\">7<\u002Fdiv><div class=\"l\">System gaps<\u002Fdiv><\u002Fdiv>\n      <div class=\"sc green\"><div class=\"n\">5<\u002Fdiv><div class=\"l\">Strengths to preserve<\u002Fdiv><\u002Fdiv>\n      <div class=\"sc neutral\"><div class=\"n\">B−<\u002Fdiv><div class=\"l\">Overall grade<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== FINDINGS ====== -->\n  <section id=\"findings\">\n    <div class=\"sec-head\">\n      <div class=\"sec-num\">01 / FINDINGS<\u002Fdiv>\n      <h2>Where the system and the product disagree<\u002Fh2>\n      <div class=\"sub\">Each finding cites a file. Fix these before expanding the system further — otherwise docs keep drifting from reality.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"findings\">\n\n      <!-- F1: globals.css ships wrong theme -->\n      <div class=\"finding crit\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-01<\u002Fdiv>\n          <div class=\"f-title\">globals.css ships the generic starter palette, not the Wes Anderson one<\u002Fdiv>\n          <span class=\"verdict crit\"><span class=\"bd\"><\u002Fspan>Critical<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          Every page of the app imports <code>app/globals.css<\u002Fcode>. That file still defines <code>--primary: #2563eb<\u002Fcode>, <code>--chat-user-bg: #eff6ff<\u002Fcode>, <code>--canvas-pane: #f8fafc<\u002Fcode>, and a full <code>prefers-color-scheme: dark<\u002Fcode> block in Tailwind/Next.js starter blues. None of the documented tokens (<code>--cream<\u002Fcode>, <code>--terracotta<\u002Fcode>, <code>--ink<\u002Fcode>) exist here at runtime.\n        <\u002Fdiv>\n        <div class=\"f-evidence\">app/globals.css  →  <b>--primary: #2563eb;<\u002Fb>\n                    <b>--chat-user-bg: #eff6ff;<\u002Fb>\n                    <b>--canvas-pane: #f8fafc;<\u002Fb>\nbody { font-family: <b>Arial, Helvetica, sans-serif<\u002Fb>; }   ← Jost/Baskerville never loaded<\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Replace <code>globals.css<\u002Fcode> wholesale with the token block from <code>design-system.md<\u002Fcode> + the Google Fonts import. Delete the dark-mode block (the system is light-only by design) or explicitly design a dark variant first.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F2: Tailwind config missing -->\n      <div class=\"finding crit\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-02<\u002Fdiv>\n          <div class=\"f-title\">Custom Tailwind utilities (<span class=\"mono\">bg-terracotta<\u002Fspan>, <span class=\"mono\">text-ink<\u002Fspan>…) don't resolve — no config extends them<\u002Fdiv>\n          <span class=\"verdict crit\"><span class=\"bd\"><\u002Fspan>Critical<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          <code>docs/design-conventions.md<\u002Fcode> instructs engineers to use <code>bg-terracotta<\u002Fcode>, <code>text-ink-light<\u002Fcode>, <code>hover:bg-parchment<\u002Fcode>, etc. But there is no <code>tailwind.config.*<\u002Fcode> in the repo, and <code>globals.css<\u002Fcode>'s <code>@theme inline<\u002Fcode> block only declares the blue/slate tokens. These class names either silently do nothing or — worse — collide with Tailwind's default palette in unexpected ways.\n        <\u002Fdiv>\n        <div class=\"f-evidence\">$ find thinkhaven -name \"tailwind.config.*\"  →  <b>(no matches)<\u002Fb>\nglobals.css @theme inline block declares only:\n    --color-primary, --color-chat-pane, --color-canvas-bg  …<\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Under Tailwind v4, register each palette token inside the <code>@theme<\u002Fcode> block as <code>--color-cream: #FAF7F2;<\u002Fcode> etc. Then <code>bg-cream<\u002Fcode>, <code>text-terracotta<\u002Fcode>, <code>border-ink<\u002Fcode> all work. Also register <code>--font-display<\u002Fcode>, <code>--font-body<\u002Fcode>, <code>--font-mono<\u002Fcode> and spacing tokens so the documented utility classes match reality.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F3: landing page still blue -->\n      <div class=\"finding crit\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-03<\u002Fdiv>\n          <div class=\"f-title\"><span class=\"mono\">app/page.tsx<\u002Fspan> (public landing) is still the starter template<\u002Fdiv>\n          <span class=\"verdict crit\"><span class=\"bd\"><\u002Fspan>Critical<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          First impression to every visitor. Uses <code>bg-gradient-to-br from-blue-50 to-indigo-100<\u002Fcode>, <code>text-gray-900<\u002Fcode>, <code>bg-blue-100<\u002Fcode> icon chips, and a <code>bg-gray-900<\u002Fcode> footer — all explicitly banned by the \"Never Use\" section of design-conventions.md. The mocks in <code>docs/design/pages/<\u002Fcode> already show the intended design: cream background, terracotta CTAs, serif body, credit pill.\n        <\u002Fdiv>\n        <div class=\"f-evidence\">app/page.tsx:43   <b>bg-gradient-to-br from-blue-50 to-indigo-100<\u002Fb>\napp/page.tsx:47   <b>text-5xl font-bold text-gray-900<\u002Fb>\napp/page.tsx:59   <b>bg-blue-100<\u002Fb> … <b>text-blue-600<\u002Fb>\napp/page.tsx:171  <b>bg-gray-900 text-white<\u002Fb>   ← footer<\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Rebuild the landing from <code>docs/design/pages/screen-dashboard-simplified.png<\u002Fcode> as the reference: cream page, NavBar with terracotta \"Get Started\", Jost display hero, four mode features (Inquisitive/Devil's Advocate/Encouraging/Realistic), Libre Baskerville body copy. One-shot replacement — don't incrementally recolor.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F4: BMAD components -->\n      <div class=\"finding crit\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-04<\u002Fdiv>\n          <div class=\"f-title\">BMAD components (the core product surface) use blue/purple gradients and banned grays<\u002Fdiv>\n          <span class=\"verdict crit\"><span class=\"bd\"><\u002Fspan>Critical<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          These are the components users actually sit inside during a strategic session. <code>BmadInterface.tsx<\u002Fcode> and <code>PathwaySelector.tsx<\u002Fcode> use <code>bg-gradient-to-br from-blue-500 to-purple-600<\u002Fcode>, <code>bg-blue-100 text-blue-800<\u002Fcode> pathway chips, and <code>text-purple-500<\u002Fcode>/<code>text-blue-500<\u002Fcode> icon colors. <code>ElicitationPanel.tsx<\u002Fcode> hardcodes category→color maps (<code>'strategy': 'bg-purple-100…'<\u002Fcode>) — exactly what the palette wants to replace with mode colors (Inquisitive/Advocate/Encouraging/Realistic).\n        <\u002Fdiv>\n        <div class=\"f-evidence\">BmadInterface.tsx:277   <b>bg-gradient-to-br from-blue-500 to-purple-600<\u002Fb>\nElicitationPanel.tsx:88  'analysis':  <b>'bg-blue-100 text-blue-800 …'<\u002Fb>\n                         'strategy':  <b>'bg-purple-100 text-purple-800 …'<\u002Fb>\nPathwaySelector.tsx:188  <svg classname=\"&lt;b\">\"text-purple-500\" …&gt;<\u002Fsvg><\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Map category → palette token (analysis→slate-blue, strategy→forest, creative→dusty-rose, default→ink-light). Replace blue-purple gradients with <code>bg-terracotta<\u002Fcode> solid, or a terracotta↔rust gradient if you need gradation. Do this as one PR so chat + canvas + elicitation feel consistent.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F5: dashboard drift -->\n      <div class=\"finding warn\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-05<\u002Fdiv>\n          <div class=\"f-title\">Dashboard and Workspace pages use grays that are banned in conventions<\u002Fdiv>\n          <span class=\"verdict warn\"><span class=\"bd\"><\u002Fspan>High<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          <code>app/dashboard/page.tsx<\u002Fcode> has <code>bg-gradient-to-r from-blue-50 to-indigo-50<\u002Fcode>, <code>text-gray-900<\u002Fcode>, <code>hover:bg-gray-50<\u002Fcode>, <code>bg-gray-100<\u002Fcode>. The gray-replacement map already exists in <code>design-conventions.md<\u002Fcode> — the codebase just hasn't applied it. This is mechanical cleanup, not a design decision.\n        <\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Run a codemod / find-replace against the gray-replacement map. Ship as a single PR titled \"align app to design system — part 1: grays\".<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F6: No dark mode decision -->\n      <div class=\"finding warn\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-06<\u002Fdiv>\n          <div class=\"f-title\">Dark mode exists in code but not in the design system<\u002Fdiv>\n          <span class=\"verdict warn\"><span class=\"bd\"><\u002Fspan>High<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          <code>globals.css<\u002Fcode> has a full <code>@media (prefers-color-scheme: dark)<\u002Fcode> block defining its own inverted blue scheme. Neither design-system.md nor the mocks mention dark mode. Users on a dark OS get a broken, half-branded experience.\n        <\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Decide: (a) ship light-only for now — remove the dark block and add <code>color-scheme: light<\u002Fcode>; or (b) intentionally design a \"midnight study\" dark variant (deep ink background, warmed cream text, muted terracotta). Don't leave the auto-generated one in place.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F7: Font loading -->\n      <div class=\"finding warn\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-07<\u002Fdiv>\n          <div class=\"f-title\">Jost / Libre Baskerville / JetBrains Mono are never actually loaded<\u002Fdiv>\n          <span class=\"verdict warn\"><span class=\"bd\"><\u002Fspan>High<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          The system is explicit: Jost for display, Libre Baskerville for body, JetBrains Mono for data. <code>globals.css<\u002Fcode> body rule says <code>font-family: Arial, Helvetica, sans-serif;<\u002Fcode>. No Google Fonts link in <code>app/layout.tsx<\u002Fcode>, no <code>next/font<\u002Fcode> import for these families. Every \"on-brand\" class still renders in Arial.\n        <\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Use <code>next/font/google<\u002Fcode> in <code>app/layout.tsx<\u002Fcode> to load Jost (400/500/600), Libre Baskerville (400/700 + italic), JetBrains Mono (400/500). Expose as <code>--font-display<\u002Fcode>, <code>--font-body<\u002Fcode>, <code>--font-mono<\u002Fcode> CSS variables on <code>&lt;body&gt;<\u002Fcode>.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F8: No documented motion -->\n      <div class=\"finding warn\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-08<\u002Fdiv>\n          <div class=\"f-title\">Motion is named but never specified — no examples, no usage rules<\u002Fdiv>\n          <span class=\"verdict warn\"><span class=\"bd\"><\u002Fspan>Medium<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          Design-system.md lists three durations and two easings. Nothing tells a developer <i>when<\u002Fi> to use which — no patterns for modal entry, chat bubble appearance, canvas cell commits, badge transitions. For a \"Wes Anderson\" system, motion is half the personality (deliberate, symmetrical, slightly mechanical).\n        <\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Add a motion section with named patterns: <code>enter.fade-up<\u002Fcode> (250ms, ease-out-expo, 8px translate), <code>enter.stagger<\u002Fcode> (40ms step), <code>state.pulse<\u002Fcode> (pending viability score), <code>page.crossfade<\u002Fcode> (400ms). Show them as looping demos in a /design/motion page.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F9: Board members vs modes confusion -->\n      <div class=\"finding warn\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-09<\u002Fdiv>\n          <div class=\"f-title\">\"Board member colors\" and \"Mode colors\" overlap and compete<\u002Fdiv>\n          <span class=\"verdict warn\"><span class=\"bd\"><\u002Fspan>Medium<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          design-conventions.md assigns terracotta to Mary, mustard to Victoria, forest to Casey, etc. design-system.md <i>also<\u002Fi> assigns mustard to Inquisitive mode, rust to Devil's Advocate, dusty-rose to Encouraging. So mustard means both \"Victoria\" and \"Inquisitive mode\". On a screen showing Victoria in Inquisitive mode, the signal collapses.\n        <\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Pick one axis as the primary color-carrier. I'd suggest: <b>modes carry color<\u002Fb> (they're visible on every message), <b>board members carry shape/avatar<\u002Fb> (monogram + role-label, same terracotta avatar bg). Update both docs to agree.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F10: No component states documented -->\n      <div class=\"finding warn\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-10<\u002Fdiv>\n          <div class=\"f-title\">Component states are under-specified (disabled, loading, error, empty)<\u002Fdiv>\n          <span class=\"verdict warn\"><span class=\"bd\"><\u002Fspan>Medium<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          Buttons list primary/secondary/ghost/danger/disabled but disabled uses <code>bg-ink/15<\u002Fcode> — a single snippet, no motion/cursor rules. Cards have one style, no loading skeleton, no error state, no empty-state pattern. Inputs have default + focus but no error, no with-icon, no disabled. Strategic apps live in loading/empty/error states half the time — they need specs.\n        <\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>For each component type, specify 5 states: default / hover / focus / disabled / loading. Add an empty-state pattern (illustration slot + headline + ghost CTA) and an error-state pattern (rust left-accent, inline retry).<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- F11: No spacing / layout rhythm -->\n      <div class=\"finding warn\">\n        <div class=\"f-head\">\n          <div class=\"f-id\">F-11<\u002Fdiv>\n          <div class=\"f-title\">Layout rhythm is absent — no grid, no density rules, no breakpoints<\u002Fdiv>\n          <span class=\"verdict warn\"><span class=\"bd\"><\u002Fspan>Medium<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"f-body\">\n          Spacing tokens are defined but there's no guidance on <i>composition<\u002Fi>: what's the column grid? What's the vertical rhythm between sections? When do you use 16px vs 24px gaps? Breakpoints appear only as <code>--screen-dual-pane: 768px<\u002Fcode> in globals.css with no documented counterparts.\n        <\u002Fdiv>\n        <div class=\"f-fix\"><b>Fix<\u002Fb>Add: 12-col grid on 1200/1400 max-widths, 72px section spacing on landing, 40px card rhythm in dashboard, breakpoints at 640/768/1024/1400. Document \"density modes\" — compact (chat, canvas cells) vs generous (landing, dashboard).<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== TOKENS / DRIFT ====== -->\n  <section id=\"tokens\">\n    <div class=\"sec-head\">\n      <div class=\"sec-num\">02 / TOKENS<\u002Fdiv>\n      <h2>The documented palette vs. what actually ships<\u002Fh2>\n      <div class=\"sub\">Left: the system on paper. Right: what <code>globals.css<\u002Fcode> actually exports at runtime today.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"drift\">\n      <div class=\"drift-col\">\n        <h4>Documented — Wes Anderson<\u002Fh4>\n        <div class=\"swatches\">\n          <div class=\"sw\" style=\"background:#FAF7F2\"><span class=\"tag\">cream<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#F5F0E6\"><span class=\"tag\">parchment<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#C4785C\"><span class=\"tag\">terracotta<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#4A6741\"><span class=\"tag\">forest<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#2C2416\"><span class=\"tag\">ink<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#D4A84B\"><span class=\"tag\">mustard<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#C9A9A6\"><span class=\"tag\">rose<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#6B7B8C\"><span class=\"tag\">slate<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#8B4D3B\"><span class=\"tag\">rust<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#A3B18A\"><span class=\"tag\">sage<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"drift-arrow\">≠<\u002Fdiv>\n      <div class=\"drift-col bad\">\n        <h4>Shipped — Tailwind starter blues<\u002Fh4>\n        <div class=\"swatches\">\n          <div class=\"sw\" style=\"background:#ffffff\"><span class=\"tag\">bg<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#fafafa\"><span class=\"tag\">chat-pane<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#f8fafc\"><span class=\"tag\">canvas-pane<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#2563eb\"><span class=\"tag\">primary<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#1d4ed8\"><span class=\"tag\">hover<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#0ea5e9\"><span class=\"tag\">accent<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#eff6ff\"><span class=\"tag\">user-bg<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#f0f9ff\"><span class=\"tag\">ai-bg<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#fef3c7\"><span class=\"tag\">system<\u002Fspan><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#64748b\"><span class=\"tag\">secondary<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Full palette card -->\n    <div style=\"margin-top:60px\">\n      <h3 style=\"font-size:20px;margin-bottom:24px;font-weight:500\">Proposed canonical palette (with usage)<\u002Fh3>\n      <div class=\"palette\">\n        <div class=\"color\"><div class=\"chip\" style=\"background:#FAF7F2\"><\u002Fdiv><div class=\"n\">Cream<\u002Fdiv><div class=\"h\">#FAF7F2<\u002Fdiv><div class=\"u\">Page backgrounds<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#F5F0E6\"><\u002Fdiv><div class=\"n\">Parchment<\u002Fdiv><div class=\"h\">#F5F0E6<\u002Fdiv><div class=\"u\">Cards, hover, AI bubble<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#C4785C\"><\u002Fdiv><div class=\"n\">Terracotta<\u002Fdiv><div class=\"h\">#C4785C<\u002Fdiv><div class=\"u\">Primary CTA, Mary avatar<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#4A6741\"><\u002Fdiv><div class=\"n\">Forest<\u002Fdiv><div class=\"h\">#4A6741<\u002Fdiv><div class=\"u\">Success, high viability<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#2C2416\"><\u002Fdiv><div class=\"n\">Ink<\u002Fdiv><div class=\"h\">#2C2416<\u002Fdiv><div class=\"u\">Primary text<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#4A3D2E\"><\u002Fdiv><div class=\"n\">Ink light<\u002Fdiv><div class=\"h\">#4A3D2E<\u002Fdiv><div class=\"u\">Body copy, descriptions<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#D4A84B\"><\u002Fdiv><div class=\"n\">Mustard<\u002Fdiv><div class=\"h\">#D4A84B<\u002Fdiv><div class=\"u\">Inquisitive mode, warnings<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#8B4D3B\"><\u002Fdiv><div class=\"n\">Rust<\u002Fdiv><div class=\"h\">#8B4D3B<\u002Fdiv><div class=\"u\">Devil's Advocate, errors<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#C9A9A6\"><\u002Fdiv><div class=\"n\">Dusty rose<\u002Fdiv><div class=\"h\">#C9A9A6<\u002Fdiv><div class=\"u\">Encouraging mode<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#6B7B8C\"><\u002Fdiv><div class=\"n\">Slate blue<\u002Fdiv><div class=\"h\">#6B7B8C<\u002Fdiv><div class=\"u\">Realistic mode, muted<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#A3B18A\"><\u002Fdiv><div class=\"n\">Sage<\u002Fdiv><div class=\"h\">#A3B18A<\u002Fdiv><div class=\"u\">Decorative accents only<\u002Fdiv><\u002Fdiv>\n        <div class=\"color\"><div class=\"chip\" style=\"background:#B56A4E\"><\u002Fdiv><div class=\"n\">Terracotta -h<\u002Fdiv><div class=\"h\">#B56A4E<\u002Fdiv><div class=\"u\">Hover, pressed states<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== TYPE ====== -->\n  <section>\n    <div class=\"sec-head\">\n      <div class=\"sec-num\">03 / TYPE<\u002Fdiv>\n      <h2>Typography specimen<\u002Fh2>\n      <div class=\"sub\">These render here because this page loads the fonts; the actual app currently doesn't. See F-07.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"type-spec\">\n      <div class=\"type-row\"><div class=\"type-label\">Display<\u002Fdiv><div class=\"t-display\">Pressure-test your pivot.<\u002Fdiv><div class=\"type-meta\">Jost 500 · 48/53<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><div class=\"type-label\">H1<\u002Fdiv><div class=\"t-h1\">Welcome back, Kevin<\u002Fdiv><div class=\"type-meta\">Jost 500 · 36/43<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><div class=\"type-label\">H2<\u002Fdiv><div class=\"t-h2\">B2B Pivot Analysis<\u002Fdiv><div class=\"type-meta\">Jost 500 · 28/35<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><div class=\"type-label\">H3<\u002Fdiv><div class=\"t-h3\">What the board will challenge<\u002Fdiv><div class=\"type-meta\">Jost 500 · 22/29<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><div class=\"type-label\">Body<\u002Fdiv><div class=\"t-body\">Great question. Before diving into tactics, let's stress-test the core assumption: is the problem that B2C doesn't work, or that you haven't found product-market fit yet?<\u002Fdiv><div class=\"type-meta\">Libre Baskerville 400 · 16/26<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><div class=\"type-label\">Caption<\u002Fdiv><div class=\"t-caption\">Recent sessions<\u002Fdiv><div class=\"type-meta\">Jost 500 · 12/17 · +10% tracking<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><div class=\"type-label\">Mono<\u002Fdiv><div class=\"mono\" style=\"font-size:14px\">session_id: <b>str_01H8ZKX...<\u002Fb> · viability: 7.2/10 · mode: inquisitive<\u002Fdiv><div class=\"type-meta\">JetBrains Mono 400 · 14/21<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== COMPONENTS ====== -->\n  <section id=\"components\">\n    <div class=\"sec-head\">\n      <div class=\"sec-num\">04 / COMPONENTS<\u002Fdiv>\n      <h2>Component patterns — documented vs. demonstrated<\u002Fh2>\n      <div class=\"sub\">Each block is the documented spec rendered live. Use these as the reference when aligning code.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cgrid\">\n\n      <div class=\"ccard\">\n        <h4>Buttons<\u002Fh4>\n        <div class=\"dsc\">Primary · Secondary · Ghost · Danger<\u002Fdiv>\n        <div class=\"demo\">\n          <button class=\"btn btn-primary\">Start Session<\u002Fbutton>\n          <button class=\"btn btn-secondary\">Cancel<\u002Fbutton>\n          <button class=\"btn btn-ghost\">Learn more<\u002Fbutton>\n          <button class=\"btn btn-danger\">Delete<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ccard\">\n        <h4>Mode Badges<\u002Fh4>\n        <div class=\"dsc\">Mary's current mode — one per message<\u002Fdiv>\n        <div class=\"demo\">\n          <span class=\"mbadge m-inq\"><span class=\"d\"><\u002Fspan>Inquisitive<\u002Fspan>\n          <span class=\"mbadge m-dev\"><span class=\"d\"><\u002Fspan>Devil's Advocate<\u002Fspan>\n          <span class=\"mbadge m-enc\"><span class=\"d\"><\u002Fspan>Encouraging<\u002Fspan>\n          <span class=\"mbadge m-real\"><span class=\"d\"><\u002Fspan>Realistic<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ccard\">\n        <h4>Chat Bubbles<\u002Fh4>\n        <div class=\"dsc\">Asymmetric radius · terracotta user · parchment AI<\u002Fdiv>\n        <div class=\"demo\" style=\"display:flex;justify-content:flex-start\">\n          <div class=\"chat\">\n            <div class=\"bubble bub-user\">I've been considering pivoting our SaaS from B2C to B2B.<\u002Fdiv>\n            <div class=\"bubble bub-ai\">Before diving into tactics, let's stress-test the core assumption — is the problem that B2C doesn't work, or that you haven't found PMF yet?<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ccard\">\n        <h4>Viability Score<\u002Fh4>\n        <div class=\"dsc\">8–10 forest · 5–7 mustard · 1–4 rust<\u002Fdiv>\n        <div class=\"demo\">\n          <div class=\"score-demo\">\n            <div class=\"score hi\">8.5<span class=\"sm\">/10<\u002Fspan><\u002Fdiv>\n            <div class=\"score md\">6.3<span class=\"sm\">/10<\u002Fspan><\u002Fdiv>\n            <div class=\"score lo\">3.1<span class=\"sm\">/10<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ccard\">\n        <h4>Card<\u002Fh4>\n        <div class=\"dsc\">Parchment bg · 1px ink/10 border · radius-md · shadow<\u002Fdiv>\n        <div class=\"demo\" style=\"padding:28px\">\n          <div style=\"background:var(--parchment);border:1px solid var(--b);border-radius:12px;padding:20px 22px;box-shadow:0 2px 8px rgba(44,36,22,.08);width:320px\">\n            <div style=\"font-family:var(--display);font-weight:500;font-size:15px;margin-bottom:2px\">B2B Pivot Analysis<\u002Fdiv>\n            <div class=\"mono\" style=\"color:var(--slate-blue);font-size:12px\">24 min · New Idea<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ccard\">\n        <h4>Input<\u002Fh4>\n        <div class=\"dsc\">1px ink/15 border · focus ring terracotta<\u002Fdiv>\n        <div class=\"demo\">\n          <label style=\"width:100%;max-width:360px\">\n            <div class=\"t-caption\" style=\"margin-bottom:6px\">Session name<\u002Fdiv>\n            <input placeholder=\"Challenge my thinking…\" style=\"width:100%;padding:10px 14px;font-family:var(--body);font-size:14px;border:1px solid rgba(44,36,22,.15);border-radius:8px;background:#fff;outline:none\" onfocus=\"this.style.borderColor='var(--terracotta)';this.style.boxShadow='0 0 0 3px rgba(196,120,92,.15)'\" onblur=\"this.style.borderColor='rgba(44,36,22,.15)';this.style.boxShadow='none'\">\n          <\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== GAPS ====== -->\n  <section id=\"gaps\">\n    <div class=\"sec-head\">\n      <div class=\"sec-num\">05 / GAPS<\u002Fdiv>\n      <h2>What the system is missing<\u002Fh2>\n      <div class=\"sub\">These are absences in the documented system itself — independent of implementation drift.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <table class=\"gaps\">\n      <thead>\n        <tr><th>Area<\u002Fth><th>Status<\u002Fth><th>What's missing<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>Dark mode<\u002Ftd><td><span class=\"stat miss\">Missing<\u002Fspan><\u002Ftd><td>No decision documented. Implementation ships an off-brand auto variant. Either remove or design intentionally.<\u002Ftd><\u002Ftr>\n        <tr><td>Empty states<\u002Ftd><td><span class=\"stat miss\">Missing<\u002Fspan><\u002Ftd><td>No pattern for \"no sessions yet\", \"canvas not explored\", \"search returned nothing\". These are common in a session-based product.<\u002Ftd><\u002Ftr>\n        <tr><td>Loading / skeletons<\u002Ftd><td><span class=\"stat miss\">Missing<\u002Fspan><\u002Ftd><td><code>loading-shimmer<\u002Fcode> is used in <code>page.tsx<\u002Fcode> but never specified. Shimmer colors, timing, skeleton layouts for chat/canvas/dashboard.<\u002Ftd><\u002Ftr>\n        <tr><td>Iconography<\u002Ftd><td><span class=\"stat miss\">Missing<\u002Fspan><\u002Ftd><td>Icons in screenshots look like Lucide, but no system rule: stroke width, filled vs line, size scale, color rules, hand-drawn vs geometric. \"Wes Anderson\" should feel slightly vintage — consider a curated set.<\u002Ftd><\u002Ftr>\n        <tr><td>Data viz<\u002Ftd><td><span class=\"stat weak\">Weak<\u002Fspan><\u002Ftd><td>Viability score is covered. Lean Canvas cell states (explored/in-progress/empty) are implied by mock but not specified. Progress bars, timelines, charts are absent.<\u002Ftd><\u002Ftr>\n        <tr><td>Motion tokens → patterns<\u002Ftd><td><span class=\"stat weak\">Weak<\u002Fspan><\u002Ftd><td>Durations and easings exist; actual motion patterns (enter, exit, stagger, page transition) don't.<\u002Ftd><\u002Ftr>\n        <tr><td>Focus / a11y<\u002Ftd><td><span class=\"stat weak\">Weak<\u002Fspan><\u002Ftd><td>One line on outlines in the lovable CSS. No documented focus ring for buttons/cards/cells, no keyboard nav rules for Lean Canvas (major accessibility surface).<\u002Ftd><\u002Ftr>\n        <tr><td>Content voice<\u002Ftd><td><span class=\"stat weak\">Weak<\u002Fspan><\u002Ftd><td>Tone (\"Challenge my thinking…\", \"Pressure-test your pivot\") is strong in mocks but not codified. Add a voice guide: 2nd person, verbs over nouns, no corporate hedging.<\u002Ftd><\u002Ftr>\n        <tr><td>Layout grid<\u002Ftd><td><span class=\"stat miss\">Missing<\u002Fspan><\u002Ftd><td>Spacing scale exists, composition doesn't. Columns, gutters, section rhythm, max-widths by context.<\u002Ftd><\u002Ftr>\n        <tr><td>Board member avatars<\u002Ftd><td><span class=\"stat weak\">Weak<\u002Fspan><\u002Ftd><td>Colors listed but no visual spec — monogram? illustration? The mocks show <code>M<\u002Fcode> on terracotta circle; make that the rule.<\u002Ftd><\u002Ftr>\n        <tr><td>Responsive rules<\u002Ftd><td><span class=\"stat miss\">Missing<\u002Fspan><\u002Ftd><td>Dual-pane collapses to stacked at 767px in CSS — good. But no rules for how NavBar, Lean Canvas, sidebar behave on tablet/mobile.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fsection>\n\n  <!-- ====== MOTION PROPOSAL ====== -->\n  <section>\n    <div class=\"sec-head\">\n      <div class=\"sec-num\">06 / MOTION<\u002Fdiv>\n      <h2>Proposed motion vocabulary<\u002Fh2>\n      <div class=\"sub\">Named patterns, not loose durations. Specific enough for any engineer to apply without asking.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"motion\">\n      <div class=\"mcard\">\n        <div class=\"mv\">250ms · ease-out-expo<\u002Fdiv>\n        <h5>enter.fade-up<\u002Fh5>\n        <p>New chat messages, card appearance. 8px translate + opacity.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mcard\">\n        <div class=\"mv\">400ms · ease-in-out<\u002Fdiv>\n        <h5>page.crossfade<\u002Fh5>\n        <p>Dashboard ↔ workspace. Parchment overlay, no slide.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mcard\">\n        <div class=\"mv\">40ms step · max 6<\u002Fdiv>\n        <h5>enter.stagger<\u002Fh5>\n        <p>Session cards, Lean Canvas cells on initial load.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mcard\">\n        <div class=\"mv\">1.2s · loop<\u002Fdiv>\n        <h5>state.pulse<\u002Fh5>\n        <p>Mary is thinking. Subtle terracotta dot, 0.6→1.0 opacity.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mcard\">\n        <div class=\"mv\">150ms · ease-out<\u002Fdiv>\n        <h5>hover.lift<\u002Fh5>\n        <p>Cards rise 2px, shadow deepens one step.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mcard\">\n        <div class=\"mv\">250ms · ease-out-expo<\u002Fdiv>\n        <h5>commit.canvas-cell<\u002Fh5>\n        <p>Cell fills from empty to content, parchment→terracotta border pulse.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== RECOMMENDATIONS ====== -->\n  <section id=\"recs\">\n    <div class=\"sec-head\">\n      <div class=\"sec-num\">07 / NEXT STEPS<\u002Fdiv>\n      <h2>What to do next, in order<\u002Fh2>\n      <div class=\"sub\">Sequenced so each step unblocks the next. No step requires new design decisions the system doesn't already have.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rec\"><div class=\"rec-num\">01<\u002Fdiv><div>\n      <h4>Make the tokens real (1 day)<\u002Fh4>\n      <p>Rewrite <code>app/globals.css<\u002Fcode> to define the Wes Anderson tokens in <code>@theme<\u002Fcode>. Load Jost / Libre Baskerville / JetBrains Mono via <code>next/font<\u002Fcode> in <code>app/layout.tsx<\u002Fcode>. Delete the dark-mode block (or queue a design round for it). This single PR unblocks every subsequent change.<\u002Fp>\n      <span class=\"tagr\">F-01<\u002Fspan><span class=\"tagr\">F-02<\u002Fspan><span class=\"tagr\">F-07<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>\n\n    <div class=\"rec\"><div class=\"rec-num\">02<\u002Fdiv><div>\n      <h4>Replace the landing page in one shot (1 day)<\u002Fh4>\n      <p>Don't incrementally recolor <code>app/page.tsx<\u002Fcode> — rebuild from the dashboard mock language: cream, terracotta CTA, Jost hero, Libre Baskerville body. Ship it as a throwaway of the current page.<\u002Fp>\n      <span class=\"tagr\">F-03<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>\n\n    <div class=\"rec\"><div class=\"rec-num\">03<\u002Fdiv><div>\n      <h4>Gray + blue codemod across the app (half day)<\u002Fh4>\n      <p>Apply the replacement map in <code>design-conventions.md<\u002Fcode> mechanically. Dashboard, workspace, BMAD components. After this, no file should contain a raw <code>blue-<\u002Fcode>, <code>indigo-<\u002Fcode>, <code>purple-<\u002Fcode>, or <code>gray-<\u002Fcode> class outside syntax highlighting.<\u002Fp>\n      <span class=\"tagr\">F-04<\u002Fspan><span class=\"tagr\">F-05<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>\n\n    <div class=\"rec\"><div class=\"rec-num\">04<\u002Fdiv><div>\n      <h4>Resolve the mode-vs-member color clash (design review, 2 hr)<\u002Fh4>\n      <p>Decide the primary color axis. My recommendation: modes own color, board members own shape (avatar monograms on terracotta). Update both docs to agree, then update any component using member colors.<\u002Fp>\n      <span class=\"tagr\">F-09<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>\n\n    <div class=\"rec\"><div class=\"rec-num\">05<\u002Fdiv><div>\n      <h4>Specify the missing patterns (2–3 days)<\u002Fh4>\n      <p>Empty states, loading skeletons, error states, focus rings, motion patterns, iconography rules, voice guide. Each as a one-page doc with live examples. Put them at <code>docs/design/patterns/*.md<\u002Fcode> and cross-link from design-system.md.<\u002Fp>\n      <span class=\"tagr\">F-08<\u002Fspan><span class=\"tagr\">F-10<\u002Fspan><span class=\"tagr\">F-11<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>\n\n    <div class=\"rec\"><div class=\"rec-num\">06<\u002Fdiv><div>\n      <h4>Establish the source of truth (ongoing)<\u002Fh4>\n      <p>Right now you have three overlapping docs (<code>design-system.md<\u002Fcode>, <code>design-conventions.md<\u002Fcode>, <code>lovable-portfolio-styles.css<\u002Fcode>) plus a <code>.pen<\u002Fcode> file and PNG mocks. Pick one as canonical — I'd suggest <code>design-system.md<\u002Fcode> + a live component gallery (Storybook or a <code>/design<\u002Fcode> route in the app). Conventions becomes a short \"do/don't\" cheatsheet that links to canonical spec. Lovable styles file can stay but marked as derived.<\u002Fp>\n      <span class=\"tagr\">meta<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>\n\n    <div class=\"rec\"><div class=\"rec-num\">07<\u002Fdiv><div>\n      <h4>Guard against regression (half day)<\u002Fh4>\n      <p>Add an ESLint/Stylelint rule that fails CI on banned classes (<code>bg-blue-*<\u002Fcode>, <code>text-gray-*<\u002Fcode>, <code>from-indigo-*<\u002Fcode> etc). A regex rule is enough. This is the only way the system stays aligned over time as the product grows.<\u002Fp>\n      <span class=\"tagr\">meta<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== STRENGTHS ====== -->\n  <section>\n    <div class=\"sec-head\">\n      <div class=\"sec-num\">08 / STRENGTHS<\u002Fdiv>\n      <h2>What's already working — preserve these<\u002Fh2>\n      <div class=\"sub\">Not everything needs to change. These are the parts that make the system worth aligning to.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"findings\">\n      <div class=\"finding ok\">\n        <div class=\"f-head\"><div class=\"f-id\">S-01<\u002Fdiv><div class=\"f-title\">A genuine aesthetic point of view<\u002Fdiv><span class=\"verdict ok\"><span class=\"bd\"><\u002Fspan>Strong<\u002Fspan><\u002Fdiv>\n        <div class=\"f-body\">\"Vintage study where serious strategic thinking happens\" is specific, memorable, and differentiated. It's the reason anyone would pick ThinkHaven over a generic AI coach. Don't water it down in pursuit of \"professional\" neutrality.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"finding ok\">\n        <div class=\"f-head\"><div class=\"f-id\">S-02<\u002Fdiv><div class=\"f-title\">Serif body copy<\u002Fdiv><span class=\"verdict ok\"><span class=\"bd\"><\u002Fspan>Strong<\u002Fspan><\u002Fdiv>\n        <div class=\"f-body\">Libre Baskerville for body text in a chat product is an opinionated, correct choice — it reads as considered prose, not throwaway messaging. This single decision does a lot of the \"strategic thinking environment\" work.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"finding ok\">\n        <div class=\"f-head\"><div class=\"f-id\">S-03<\u002Fdiv><div class=\"f-title\">Mode colors are distinct and meaningful<\u002Fdiv><span class=\"verdict ok\"><span class=\"bd\"><\u002Fspan>Strong<\u002Fspan><\u002Fdiv>\n        <div class=\"f-body\">Mustard/Rust/Rose/Slate-blue map intuitively to Inquisitive/Advocate/Encouraging/Realistic. They're all muted enough to coexist on a cream page without competing. Keep the set; just stop it colliding with board members (F-09).<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"finding ok\">\n        <div class=\"f-head\"><div class=\"f-id\">S-04<\u002Fdiv><div class=\"f-title\">Existing mocks are on-spec and usable as reference<\u002Fdiv><span class=\"verdict ok\"><span class=\"bd\"><\u002Fspan>Strong<\u002Fspan><\u002Fdiv>\n        <div class=\"f-body\">The three PNGs in <code>docs/design/pages/<\u002Fcode> already demonstrate the system correctly. Use them as the specification source when rebuilding — you don't need to re-design, just implement what's there.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"finding ok\">\n        <div class=\"f-head\"><div class=\"f-id\">S-05<\u002Fdiv><div class=\"f-title\">Semantic viability scale<\u002Fdiv><span class=\"verdict ok\"><span class=\"bd\"><\u002Fspan>Strong<\u002Fspan><\u002Fdiv>\n        <div class=\"f-body\">Forest/mustard/rust mapped to 8–10 / 5–7 / 1–4 gives you a viability language that's pre-cognitive — users feel the rating before they read it. Extend this to Lean Canvas cell states and trial-credit states.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<footer>ThinkHaven Design System Audit · Prepared April 2026<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
